# ZeroBot 配置示例（YAML）
# 作用域优先级: CLI > Managed > Local > Project > User > Defaults

version: "1"

# 默认提供商与模型
# 如果在 providers 中指定了 model，会覆盖 default_model
# 未设置时，CLI 需通过 --model 指定

default_provider: "openai"
default_model: "gpt-4o-mini"

# 提供商配置
providers:
  openai:
    kind: "openai"
    # 直接写入 key（不推荐）
    api_key: ""
    # 或使用环境变量
    api_key_env: "OPENAI_API_KEY"
    # 可选，默认 https://api.openai.com/v1
    base_url: ""
    # 可选，优先于 default_model
    model: ""
    timeout_secs: 60
  anthropic:
    kind: "anthropic"
    api_key: ""
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: ""
    model: ""
    timeout_secs: 60

# 会话与存储
session:
  # 默认数据库路径
  db_path: "~/.zerobot/state/zerobot.db"
  # 历史消息保留数量
  max_history: 200

# 上下文管理
context:
  # 最大消息条数（0 表示不限制，仍会受 max_chars 影响）
  max_messages: 200
  # 最大字符数（0 表示不限制）
  max_chars: 120000
  # 是否注入环境信息（工作目录/日期/平台等）
  include_environment: true

# 工具开关
# enabled 列表决定可用工具
# allow_paths 为空表示不限制路径

tools:
  enabled:
    - read
    - write
    - edit
    - patch
    - glob
    - grep
    - shell
  allow_paths: []
  output:
    # 工具输出的最大行数
    max_lines: 2000
    # 工具输出的最大字节数
    max_bytes: 51200
    # 截断方向：head 或 tail
    direction: "head"

# Agent 设置
agent:
  # 系统提示词（默认已内置，可按需覆盖）
  system_prompt: |
    你是 ZeroBot，一个面向软件研发的智能体助手。你的目标是帮助用户高质量、可执行地完成工程任务，同时保持输出简洁清晰。

    ## 行为原则
    - 优先解决问题本身，避免无关延伸。
    - 不臆测：不确定的信息要说明假设或向用户确认。
    - 在需要改动代码时，先获取足够上下文再修改。
    - 关注正确性与可维护性，避免制造隐性风险。

    ## 工具使用
    - 读代码：优先使用 read/grep/glob 获取上下文。
    - 写代码：使用 write/edit/patch，避免手工描述改动。
    - 执行命令：使用 shell 并关注输出与错误。
    - 输出过长时，会被截断；可以用 read 的 offset/limit 获取局部内容。

    ## 输出要求
    - 先给结论或下一步，再给必要的细节。
    - 如果需要用户决策或补充，明确提出问题。
    - 对重要风险或限制要显式提示。
  max_steps: 100

# 日志设置
logging:
  level: "info"

# MCP 配置
mcp:
  enabled: false
  # MCP 服务器列表
  servers:
    - name: "local-tools"
      type: "local"
      command: ["mcp-server", "--stdio"]
      env: {}
      protocol: "content_length"
      timeout_ms: 5000
      enabled: true
    - name: "remote-tools"
      type: "remote"
      url: "https://example.com/mcp"
      headers: {}
      timeout_ms: 5000
      enabled: false

# Skill 配置
skills:
  enabled: false
  # 额外 Skill 目录
  paths:
    - "~/.zerobot/skills"
    - "./.zerobot/skills"
